<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body>
    <div class="wrapper">
      <main>
        <div class="sideMenu">
          <div class="content">
            <div class="top">
              <div class="logo"><img src="./images/logo.png" alt="" /></div>
              <button class="sideBtn">
                <i class="icon"><img src="./images/icon/dock_to_right.svg" alt="" /></i>
              </button>
            </div>
            <nav class="menu">
              <ul>
                <li>
                  <button type="button" class="newChat">
                    <i class="icon add"><img src="./images/icon/add.svg" alt="" /></i><span>New chat</span>

                  <button type="button">
                    <i class="icon"><img src="./images/icon/comic_bubble.svg" alt="" /></i><span>History</span>
                  </button>
                </li>
                <li>
                  <button type="button">
                    <i class="icon"><img src="./images/icon/favorite.svg" alt="" /></i><span>Favorites</span>
                  </button>
                </li>
              </ul>
            </nav>
            <div class="recent">
              <div class="title">Recent</div>
              <div class="list">
                <ul>

                    <button type="button" class="deleteBtn">
                      <i class="icon"><img src="./images/icon/delete.svg" alt="" /></i>
                    </button>
                  </li>
                  <li>
                    <button type="button">how is the solar panel market</button>
                    <button type="button" class="deleteBtn">
                      <i class="icon"><img src="./images/icon/delete.svg" alt="" /></i>
                    </button>
                  </li>
                  <li>
                    <button type="button">how is the solar panel market</button>
                    <button type="button" class="deleteBtn">
                      <i class="icon"><img src="./images/icon/delete.svg" alt="" /></i>
                    </button>
                  </li>
                  <li>
                    <button type="button">how is the solar panel market</button>
                    <button type="button" class="deleteBtn">
                      <i class="icon"><img src="./images/icon/delete.svg" alt="" /></i>
                    </button>
                  </li>
                  <li>
                    <button type="button">how is the solar panel market</button>
                    <button type="button" class="deleteBtn">
                      <i class="icon"><img src="./images/icon/delete.svg" alt="" /></i>
                    </button>
                  </li>
                  <li>
                    <button type="button">how is the solar panel market</button>
                    <button type="button" class="deleteBtn">
                      <i class="icon"><img src="./images/icon/delete.svg" alt="" /></i>
                    </button>
                  </li>
                  <li>
                    <button type="button">how is the solar panel market</button>
                    <button type="button" class="deleteBtn">
                      <i class="icon"><img src="./images/icon/delete.svg" alt="" /></i>
                    </button>
                  </li>
                </ul>
              </div>
              <button type="button" class="viewMore">
                <i class="icon"><img src="./images/icon/viewMore.svg" alt="" /></i><span>view all chats</span>
              </button>
            </div>
          </div>
        </div>
        <div class="mainBox">
          <nav class="mainTopMenu">
            <div class="profileMenu">
              <button type="button" class="profileBtn">
                <i class="icon"><img src="./images/icon/account_.svg" alt="" /></i>
                <span>Danielle Mo</span>
              </button>
            </div>
          </nav>
          <div class="mainContent">
            <div class="mobileMenuTop">
              <button class="sideBtn">
                <i class="icon"><img src="./images/icon/dock_to_right.svg" alt="" /></i>
              </button>
              <div class="logo"><img src="./images/logo.png" alt="" /></div>
            </div>

            <div class="contentBox">
              <div class="resizer"></div>
              <div class="chatBox">
                <div class="chatTitle">
                  <div class="titleBox">
                    <span>Leading supplier of high-quality carbon stainless steel screws, offering a wide range of size</span>
                  </div>
                  <div class="pasteSearchBox">
                    <button type="button" class="pasteSearchBtn">
                      <i class="icon"><img src="./images/icon/paste_search.svg" alt="" /></i>
                    </button>

                    <div class="pasteSearchListBox">
                      <div class="blockTitle">Results history</div>
                      <div class="pasteSearchList">
                        <button type="button" class="item">
                          <div class="title">Carbon stainless steel screw supplier</div>
                          <div class="type">Supplier Search</div>
                        </button>
                        <button type="button" class="item">
                          <div class="title">Carbon stainless steel screw supplier</div>
                          <div class="type">Supplier Search</div>
                        </button>
                        <button type="button" class="item">
                          <div class="title">Carbon stainless steel screw supplier</div>
                          <div class="type">Supplier Search</div>
                        </button>
                        <button type="button" class="item">
                          <div class="title">Carbon stainless steel screw supplier</div>
                          <div class="type">Supplier Search</div>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="chatContentBox">
                  <div class="chatContent"></div>
                </div>
                <div class="textAreaBox">
                  <!-- 一般文字輸入 -->
                  <div class="autoResizeHeight">
                    <textarea maxlength="5000" name="" id="" placeholder="Ask follow up"></textarea>
                  </div>
                  <!-- 一般文字輸入欄位 -->
                  <div class="controlBox">
                    <button type="button" class="img">
                      <i class="icon"><img src="./images/icon/img.svg" alt="" /></i>
                    </button>
                    <div class="imgSearchInfo">Image Search</div>
                    <div class="submit">
                      <button type="submit" disabled>
                        <i class="icon"><img src="./images/icon/arrow.svg" alt="" /></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="ansBox">
                <button type="button" class="closeBtn">
                  <i class="icon"><img src="./images/icon/close.svg" alt="" /></i>
                </button>
                <div class="ansResult">
                  <div class="blockTitle">
                    <div class="pasteSearchBox">
                      <button type="button" class="pasteSearchBtn">
                        <i class="icon"><img src="./images/icon/paste_search.svg" alt="" /></i>
                      </button>
                    </div>
                    <span>Steel screw</span>
                  </div>

                  <div class="ansContentBox">
                    <div class="thinkBox">
                      <div class="thinkStatus">
                        <!-- + active 變更收合icon-->
                        <button type="button" class="status">
                          <i class="icon"><img src="./images/icon/check.svg" alt="" /></i>
                          <span>Search complete.</span>
                          <i class="icon"><img src="./images/icon/arrow_to_down.svg" alt="" /></i>
                        </button>
                        <!-- 展開時按鈕 加 active -->
                        <button type="button" class="advancedBtn">
                          <i class="icon"><img src="./images/icon/advanced.svg" alt="" /></i><span>Advanced</span>
                        </button>
                        <div class="advancedBox">
                          <button type="button" class="closeBtn">
                            <i class="icon"><img src="./images/icon/close.svg" alt="" /></i>
                          </button>
                          <div class="advancedTitle">
                            <i class="icon"><img src="./images/icon/advanced.svg" alt="" /></i>
                            <span>Add to enhance your results</span>
                          </div>

                          <div class="advancedList">
                            <button type="button" class="optionBtn active">
                              <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Machine screws</span>
                            </button>

                            <button type="button" class="optionBtn">
                              <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Set screws</span>
                            </button>
                            <button type="button" class="optionBtn">
                              <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Binding head</span>
                            </button>
                            <button type="button" class="optionBtn">
                              <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Lag screws</span>
                            </button>
                            <button type="button" class="optionBtn">
                              <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>ISO standards</span>
                            </button>
                            <button type="button" class="optionBtn">
                              <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Tapping screws</span>
                            </button>
                            <button type="button" class="optionBtn">
                              <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Threaded rods</span>
                            </button>
                          </div>

                          <!-- 當沒有條件被選擇時為 Disable 狀態 -->
                          <div class="btnBox">
                            <button type="submit" class="btnSecondary" disabled>Search again</button>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="filterBox">
                      <div class="filterTitle">
                        <i class="icon"><img src="./images/icon/filter.svg" alt="" /></i>Filter (1)
                      </div>
                      <div class="filterListBox">
                        <div class="filterList">
                          <button type="button" class="optionBtn active">
                            <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Small Order</span>
                          </button>
                          <button type="button" class="optionBtn">
                            <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Ship free</span>
                          </button>
                          <button type="button" class="optionBtn">
                            <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Discount</span>
                          </button>
                          <button type="button" class="optionBtn">
                            <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Premium suppliers (5+ Years)</span>
                          </button>
                          <button type="button" class="optionBtn">
                            <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Certificate</span>
                          </button>
                          <button type="button" class="optionBtn">
                            <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Exporter</span>
                          </button>
                          <button type="button" class="optionBtn">
                            <i class="icon"><img src="./images/icon/check.svg" alt="" /></i><span>Manufacturer</span>
                          </button>
                        </div>
                        <button type="button" class="btnSecondary">Apply (1)</button>
                      </div>
                    </div>
                    <div class="responseMessage">No similar suppliers found!</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="./js/main.js"></script>
  </body>
</html>
