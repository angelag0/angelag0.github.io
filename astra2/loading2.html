<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body>
    <div class="wrapper">
      <main>
        <div class="sideMenu">
          <div class="content">
            <div class="top">
              <div class="logo"><img src="./images/logo.png" alt="" /></div>
              <button class="sideBtn">
                <i class="icon"><img src="./images/icon/dock_to_right.svg" alt="" /></i>
              </button>
            </div>
            <nav class="menu">
              <ul>
                <li>
                  <button type="button" class="newChat">
                    <i class="icon add"><img src="./images/icon/add.svg" alt="" /></i><span>New chat</span>
                  </button>
                </li>
                <li>
                  <button type="button">
                    <i class="icon"><img src="./images/icon/comic_bubble.svg" alt="" /></i><span>History</span>
                  </button>
                </li>
                <li>
                  <button type="button">
                    <i class="icon"><img src="./images/icon/favorite.svg" alt="" /></i><span>Favorites</span>
                  </button>
                </li>
              </ul>
            </nav>
            <div class="recent">
              <div class="title">Recent</div>

              <div class="loaderBox"><span class="loader"></span></div>
            </div>
          </div>
        </div>
        <div class="mainBox">
          <nav class="mainTopMenu">
            <div class="profileMenu">
              <button type="button" class="profileBtn">
                <i class="icon"><img src="./images/icon/account_.svg" alt="" /></i>
                <span>Danielle Mo</span>
              </button>
            </div>
          </nav>
          <div class="mainContent">
            <div class="mobileMenuTop">
              <button class="sideBtn">
                <i class="icon"><img src="./images/icon/dock_to_right.svg" alt="" /></i>
              </button>
              <div class="logo"><img src="./images/logo.png" alt="" /></div>
            </div>
            <div class="contentBox">
              <div class="innerPage">
                <div class="pageTitle">Favorite</div>
                <div class="tabBox">
                  <div class="tabOption">
                    <!-- + active 變色-->
                    <button type="button" class="active">Product</button>
                    <button type="button">Supplier</button>
                  </div>
                  <div class="tabContentBox">
                    <!-- + active 展開-->
                    <div class="tabContent active">
                      <div class="outerContent">
                        <div class="innerContent">
                          <div class="searchInputBox">
                            <i class="icon"><img src="./images/icon/search.svg" alt="" /></i>
                            <input type="text" placeholder="Search your favorite products" />
                            <button type="button" class="clearBtn"></button>
                          </div>

                          <div class="loaderBox"><span class="loader"></span></div>

                          <div class="productBox"></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="./js/main.js"></script>
  </body>
</html>
